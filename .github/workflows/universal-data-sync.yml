name: Universal Data Sync API

on:
  repository_dispatch:
    types: [update_json]

jobs:
  sync-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: 'data'

      - name: Download new JSON payload
        env:
          FETCH_TOKEN: ${{ secrets.MY_CLASSIC_PAT }}
        run: |
          echo "Updating ${{ github.event.client_payload.target_file }}..."

          mkdir -p data/json

          curl -H "Authorization: token $FETCH_TOKEN" \
               -L "${{ github.event.client_payload.data_url }}" \
               -o "data/json/${{ github.event.client_payload.target_file }}"

      - name: Commit and Push to data branch
        run: |
          git config --global user.name "Data Sync Bot"
          git config --global user.email "hoon1018@knou.ac.kr"
          git add data/json/${{ github.event.client_payload.target_file }}
          
          git commit -m "update: ${{ github.event.client_payload.target_file }} by ${{ github.event.client_payload.updater_name }}" || echo "No changes to commit"
          git push origin data

      - name: Send Slack Notification (Success)
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"✅ [Success] (${{ github.event.client_payload.target_file }} by ${{ github.event.client_payload.updater_name }})"}' \
          $SLACK_WEBHOOK_URL

      - name: Send Slack Notification (Failure)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"❌ [Fail] story 데이터 동기화 중 에러 발생"}' \
          $SLACK_WEBHOOK_URL