<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레알 로또</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @font-face {
            font-family: 'YeogiOttaeJalnanGothic';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_231029@1.1/JalnanGothic.woff') format('woff');
            font-weight: normal;
            font-display: swap;
        }

        h1 { font-family: 'YeogiOttaeJalnanGothic', sans-serif !important; }

        body {
            margin: 0; 
            padding: 0;
            background-color: transparent; 
            overflow-x: hidden;
            overflow-y: auto !important; /* 상하 스크롤 강제 허용 */
            -webkit-touch-callout: none;
            user-select: none;
        }

        .lotto-wrapper {
            font-family: 'Pretendard', sans-serif;
            background-color: #1a1a2e; 
            color: #fff;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            padding-top: 50px; 
            padding-bottom: 150px; 
            margin: 0 auto;
            width: 100%;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .machine-container {
            position: relative; width: 320px; height: 320px; border-radius: 50%;
            border: 10px solid #2a2a4a;
            background: radial-gradient(circle at 50% 100%, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0.6) 80%);
            box-shadow: inset 0 -20px 40px rgba(0,0,0,0.8), 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden; transform: translateZ(0); mask-image: radial-gradient(white, black);
        }
        .machine-container::after {
            content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            width: 80px; height: 30px; background: radial-gradient(ellipse, rgba(100,200,255,0.4) 0%, transparent 70%);
            z-index: 1; border-radius: 50%;
        }
        .ball {
            position: absolute; width: 26px; height: 26px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 13px; color: #fff; text-shadow: 1px 1px 1px rgba(0,0,0,0.6);
            box-shadow: inset -4px -4px 8px rgba(0,0,0,0.4), 2px 2px 4px rgba(0,0,0,0.3);
            transform: translate(-50%, -50%); z-index: 10; transition: opacity 0.3s;
        }
        .color-1 { background: #fbc400; color: #333; text-shadow: none; }
        .color-2 { background: #69c8f2; color: #333; text-shadow: none; }
        .color-3 { background: #ff7272; }
        .color-4 { background: #aaaaaa; }
        .color-5 { background: #b0d840; color: #333; text-shadow: none; }

        .results-container {
            margin-top: 40px; margin-left: auto; margin-right: auto;
            display: flex; align-items: center; justify-content: flex-start; 
            gap: 2px; 
            height: 60px; padding: 0 10px; 
            width: 350px; max-width: 98%; box-sizing: border-box;
            overflow: hidden; 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(228, 197, 133, 0.25); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 20px rgba(228, 197, 133, 0.05); 
        }

        .result-ball {
            width: 40px; height: 40px; border-radius: 50%; 
            flex-shrink: 0; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; font-size: 16px; 
            letter-spacing: -0.5px;
            box-shadow: inset -5px -5px 12px rgba(0,0,0,0.4), inset 2px 2px 8px rgba(255,255,255,0.4), 0 6px 10px rgba(0,0,0,0.4);
            border: 1px solid rgba(0,0,0,0.2);
            animation-timing-function: ease-out;
            animation-fill-mode: forwards;
        }

        .result-ball:nth-child(1) { animation-name: pureRoll1; animation-duration: 2.4s; } 
        .result-ball:nth-child(2) { animation-name: pureRoll2; animation-duration: 2.1s; } 
        .result-ball:nth-child(3) { animation-name: pureRoll3; animation-duration: 1.8s; } 
        .result-ball:nth-child(4) { animation-name: pureRoll4; animation-duration: 1.4s; } 
        .result-ball:nth-child(5) { animation-name: pureRoll5; animation-duration: 1.1s; } 
        .result-ball:nth-child(6) { animation-name: pureRoll6; animation-duration: 0.8s; } 
        .result-ball:nth-child(8) { animation-name: pureRollBonus; animation-duration: 0.5s; } 

        .bonus-plus {
            font-size: 20px; font-weight: 300; color: #e4c585; margin: 0 5px; flex-shrink: 0;
            animation: fadeIn 0.6s ease;
        }

        @keyframes pureRoll1 { 0% { opacity:0; transform: translateX(330px) rotate(0deg); } 100% { opacity:1; transform: translateX(0) rotate(-945deg); } }
        @keyframes pureRoll2 { 0% { opacity:0; transform: translateX(288px) rotate(0deg); } 100% { opacity:1; transform: translateX(0) rotate(-825deg); } }
        @keyframes pureRoll3 { 0% { opacity:0; transform: translateX(246px) rotate(0deg); } 100% { opacity:1; transform: translateX(0) rotate(-705deg); } }
        @keyframes pureRoll4 { 0% { opacity:0; transform: translateX(204px) rotate(0deg); } 100% { opacity:1; transform: translateX(0) rotate(-584deg); } }
        @keyframes pureRoll5 { 0% { opacity:0; transform: translateX(162px) rotate(0deg); } 100% { opacity:1; transform: translateX(0) rotate(-464deg); } }
        @keyframes pureRoll6 { 0% { opacity:0; transform: translateX(120px) rotate(0deg); } 100% { opacity:1; transform: translateX(0) rotate(-344deg); } }
        @keyframes pureRollBonus { 0% { opacity:0; transform: translateX(65px) rotate(0deg); } 100% { opacity:1; transform: translateX(0) rotate(-186deg); } }
        
        .main-btn {
            margin-top: 30px; padding: 15px 40px; font-size: 18px; font-weight: bold;
            border: none; border-radius: 30px; background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: white; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 126, 95, 0.4); transition: transform 0.2s;
        }
        .main-btn:hover { transform: translateY(-2px); }
        .main-btn:disabled { background: #555; cursor: not-allowed; box-shadow: none; }

        .history-container {
            margin-top: 40px; width: 100%; max-width: 380px;
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-radius: 24px; padding: 30px 25px; box-sizing: border-box; display: none; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .history-container h3 { 
            margin-top: 0; margin-bottom: 25px; text-align: center; 
            font-size: 13px; font-weight: 700; color: #a1a1aa; 
            letter-spacing: 4px; text-transform: uppercase; 
        }
        .history-list { max-height: 260px; overflow-y: auto; padding-right: 5px; }
        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        
        .history-row {
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
            background: rgba(0, 0, 0, 0.25); padding: 14px 18px; border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.02); animation: fadeIn 0.4s ease;
        }
        .history-turn { 
            font-weight: 600; font-size: 11px; color: #71717a; 
            letter-spacing: 1.5px; 
        }
        
        .mini-balls { display: flex; gap: 6px; align-items: center; }
        .mini-ball {
            width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 11px; letter-spacing: -0.5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.15);
        }
        .mini-bonus-plus { font-size: 16px; color: #52525b; font-weight: 300; margin: 0 2px; }

        .button-group { display: flex; flex-direction: column; gap: 12px; margin-top: 30px; }
        .action-btn { 
            width: 100%; padding: 16px 0; font-size: 14px; font-weight: 600; 
            border: none; border-radius: 14px; cursor: pointer; transition: all 0.2s ease; letter-spacing: 1px;
        }
        .save-btn { 
            background: linear-gradient(135deg, #e4c585 0%, #b38b3a 100%);
            color: #111; box-shadow: 0 4px 15px rgba(179, 139, 58, 0.2);
        }
        .save-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(179, 139, 58, 0.35); }
        .clear-btn { 
            background: transparent; color: #71717a; border: 1px solid rgba(255,255,255,0.1); font-weight: 500;
        }
        .clear-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }

        @keyframes fadeIn { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }

        #receipt-template {
            position: absolute; left: -9999px; top: 0; width: 400px;
            background: linear-gradient(145deg, #161620, #0d0d14); 
            color: #fff; font-family: 'Pretendard', sans-serif;
            padding: 40px 30px; box-sizing: border-box;
        }
        .rt-header {
            font-size: 13px; font-weight: 600; color: #b38b3a; letter-spacing: 4px;
            text-align: center; border-bottom: 1px solid rgba(228, 197, 133, 0.2);
            padding-bottom: 15px; margin-bottom: 25px;
        }
        .rt-title-area { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        .rt-logo { font-size: 24px; font-weight: 800; color: #e4c585; line-height: 1.1; letter-spacing: 1px; }
        .rt-logo span { font-size: 11px; font-weight: 400; color: #888; letter-spacing: 2px; }
        .rt-round { font-size: 18px; font-weight: 300; color: #fff; letter-spacing: 1px; }
        .rt-info { font-size: 12px; line-height: 1.8; color: #a1a1aa; margin-bottom: 20px; letter-spacing: 0.5px; }
        .rt-info span { color: #e4e4e7; font-weight: 500; }
        .rt-serial { font-size: 11px; color: #52525b; margin-top: 10px; letter-spacing: 2px; }
        .rt-divider { border-top: 1px solid rgba(255,255,255,0.08); margin: 25px 0; }
        .rt-rows { min-height: 100px; margin-bottom: 20px; }
        .rt-row { display: flex; align-items: center; justify-content: space-between; font-size: 16px; margin-bottom: 16px; }
        .rt-row-label { font-weight: 600; color: #b38b3a; font-size: 13px; letter-spacing: 1px; }
        .rt-row-nums { flex: 1; display: flex; justify-content: flex-end; gap: 14px; font-weight: 400; color: #fff; }
        .rt-row-nums span { width: 22px; text-align: center; }
        .rt-footer { text-align: right; font-size: 13px; color: #a1a1aa; letter-spacing: 1px; }
        .rt-footer span { font-size: 24px; font-weight: 700; color: #e4c585; margin-left: 10px; letter-spacing: 0; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: rgba(20, 20, 30, 0.65); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); padding: 30px 25px; border-radius: 24px;
            text-align: center; max-width: 90%; max-height: 80vh; margin-bottom: 10vh;
            display: flex; flex-direction: column; align-items: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .modal-content p {
            color: #a1a1aa; font-weight: 400; margin-bottom: 20px; font-size: 12px; line-height: 1.6; word-break: keep-all;
            -webkit-user-select: none !important; user-select: none !important; pointer-events: none;
        }
        .modal-content p strong { color: #e4c585; font-weight: 600; font-size: 14px; letter-spacing: 1px; display: block; margin-bottom: 4px; }
        #result-image {
            max-width: 100%; max-height: 48vh; border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); border: 1px solid rgba(228, 197, 133, 0.15);
            -webkit-touch-callout: default !important; -webkit-user-select: auto !important; 
            user-select: auto !important; pointer-events: auto;
        }
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; width: 100%; }
        .dl-btn { 
            width: 100%; padding: 16px 0; font-size: 14px; font-weight: 600; letter-spacing: 1px;
            background: linear-gradient(135deg, #e4c585 0%, #b38b3a 100%); color: #111; 
            border: none; border-radius: 14px; cursor: pointer; box-shadow: 0 4px 15px rgba(179, 139, 58, 0.2);
        }
        .close-btn { 
            width: 100%; padding: 16px 0; font-size: 13px; font-weight: 500; letter-spacing: 1px;
            background: transparent; color: #71717a; border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; cursor: pointer; 
        }

        button {
            font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
            border-radius: 30px; 
            font-size: 16px; font-weight: 700; letter-spacing: 1px;
            padding: 14px 32px;
            cursor: pointer;
            outline: none;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
        }

        .btn-primary { 
            background: linear-gradient(135deg, #f6d365 0%, #ffb347 100%);
            color: #1a1a1a; 
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 
                0 8px 20px rgba(255, 179, 71, 0.4), 
                inset 0 2px 2px rgba(255, 255, 255, 0.6), 
                inset 0 -4px 4px rgba(0, 0, 0, 0.15); 
            text-shadow: 0 1px 1px rgba(255, 255, 255, 0.5); 
        }

        .btn-secondary { 
            background: rgba(20, 20, 20, 0.6);
            color: #e4c585; 
            border: 1px solid rgba(228, 197, 133, 0.3);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 
                0 6px 15px rgba(0, 0, 0, 0.4),
                inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        button:hover {
            transform: translateY(-2px); 
            filter: brightness(1.1); 
        }

        button:active {
            transform: translateY(2px) scale(0.97); 
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3), inset 0 2px 4px rgba(0, 0, 0, 0.2); 
        }

        .btn-close {
            position: absolute; top: 20px; right: 20px; z-index: 1000000;
            padding: 8px 18px; font-size: 14px; font-weight: bold;
            background: rgba(255, 255, 255, 0.15); 
            color: white; 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 20px;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

    </style>
</head>
<body>

    <div class="lotto-wrapper">
        <h1>방송 그거나 이거나</h1>
        <div class="machine-container" id="machine"></div>
        <div class="results-container" id="results"></div>
        <button class="main-btn" id="draw-btn" onclick="startDrawSequence()">추첨하기</button>

        <div class="history-container" id="history-section">
            <h3>DRAW HISTORY</h3>
            <div class="history-list" id="history-list"></div>
            <div class="button-group" id="history-buttons">
                <button class="action-btn save-btn" onclick="generateReceiptImage()">SAVE RECEIPT</button>
                <button class="action-btn clear-btn" onclick="clearHistory()">Clear All</button>
            </div>
        </div>
    </div>

    <div id="receipt-template">
        <div class="rt-header">VIP DRAW RESULT</div>
        <div class="rt-title-area">
            <div class="rt-logo">PREMIUM<br><span>Lotto 6/45</span></div>
            <div class="rt-round">EP. <span id="rt-round-num">1214</span></div>
        </div>
        <div class="rt-info">
            ISSUED : <span id="rt-issue-date"></span><br>
            DRAW : <span id="rt-draw-date"></span><br>
            EXPIRE : <span id="rt-expire-date"></span><br>
            <div class="rt-serial" id="rt-serial"></div>
        </div>
        <div class="rt-divider"></div>
        <div class="rt-rows" id="rt-rows"></div>
        <div class="rt-divider"></div>
        <div class="rt-footer">TOTAL <span>₩ <span id="rt-price">5,000</span></span></div>
    </div>

    <div id="image-modal" class="modal-overlay">
        <div class="modal-content">
            <p><strong>RECEIPT READY</strong>아래 버튼을 누르거나, 일부 브라우저는<br>이미지를 꾹 눌러 사진 앱에 저장할 수 있습니다.</p>
            <img id="result-image" src="" alt="추첨 기록">
            <div class="btn-group">
                <button id="download-img-btn" class="dl-btn">SAVE IMAGE</button>
                <button class="close-btn" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        function getBallColorClass(num) {
            if (num <= 10) return 'color-1';
            if (num <= 20) return 'color-2';
            if (num <= 30) return 'color-3';
            if (num <= 40) return 'color-4';
            return 'color-5';
        }

        const { Engine, World, Bodies, Body, Events } = Matter;
        const engine = Engine.create();
        engine.world.gravity.y = 1.0; 

        const machineEl = document.getElementById('machine');
        const cx = 160, cy = 160, radius = 155;
        const balls = []; 
        let isDrawing = false; 
        let drawHistory = [];

        const segments = 40;
        const boundaryBodies = [];
        for (let i = 0; i < segments; i++) {
            const angle = (i / segments) * Math.PI * 2;
            const x = cx + Math.cos(angle) * radius;
            const y = cy + Math.sin(angle) * radius;
            boundaryBodies.push(Bodies.rectangle(x, y, 55, 25, {
                isStatic: true, angle: angle, restitution: 0.0, friction: 0.01
            }));
        }
        World.add(engine.world, boundaryBodies);

        for (let i = 1; i <= 45; i++) {
            const body = Bodies.circle(cx + (Math.random()-0.5)*100, cy + 50 + (Math.random()*50), 13, {
                restitution: 0.9, frictionAir: 0.000, density: 0.03
            });
            World.add(engine.world, body);

            const el = document.createElement('div');
            el.className = `ball ${getBallColorClass(i)}`;
            el.innerText = i;
            machineEl.appendChild(el);
            balls.push({ number: i, body: body, el: el, active: true });
        }

        Events.on(engine, 'beforeUpdate', () => {
            balls.forEach(b => {
                if (!b.active) return;
                const pos = b.body.position;

                if (pos.y > cy + 40 && pos.x > cx - 60 && pos.x < cx + 60) {
                    const horizontalForce = (pos.x - cx) * 0.001; 
                    const verticalForce = -0.16 - (Math.random() * 0.06);
                    if (Math.random() < 0.3) {
                        Body.applyForce(b.body, pos, { x: horizontalForce + (Math.random() - 0.5) * 0.02, y: verticalForce });
                    }
                } else if (pos.y < cy) {
                     if (Math.random() < 0.05) {
                         Body.applyForce(b.body, pos, { x: (Math.random()-0.5)*0.02, y: 0.01 });
                     }
                }
            });
        });

        function render() {
            Engine.update(engine, 1000 / 60);
            balls.forEach(b => {
                if (b.active) {
                    b.el.style.left = b.body.position.x + 'px';
                    b.el.style.top = b.body.position.y + 'px';
                }
            });
            requestAnimationFrame(render);
        }
        render();

        function startDrawSequence() {
            if (isDrawing) return;

            if (navigator.vibrate) navigator.vibrate(50);

            isDrawing = true;
            
            const drawBtn = document.getElementById('draw-btn');
            drawBtn.disabled = true;
            drawBtn.innerText = "섞는 중... 🌪️"; 
            document.getElementById('results').innerHTML = '';

            const { World, Body } = Matter; 
            balls.forEach((b) => World.remove(engine.world, b.body));

            balls.forEach((b, index) => {
                b.active = true;
                b.el.style.opacity = '1';
                Body.setVelocity(b.body, { x: (Math.random() - 0.5) * 2, y: Math.random() * 2 });
                Body.setAngularVelocity(b.body, 0);

                const row = Math.floor(index / 7);
                const col = index % 7;
                Body.setPosition(b.body, { x: cx - 78 + (col * 26), y: cy - 100 + (row * 26) });
                World.add(engine.world, b.body);
            });

            setTimeout(() => {
                drawBtn.innerText = "추첨 중... 🎯"; 
                // 수정한 번호 생성 로직 호출
                const targetNumbers = generateWinningNumbers();
                let drawCount = 0;

                const drawInterval = setInterval(() => {
                    if (drawCount >= 7) {
                        clearInterval(drawInterval);
                        isDrawing = false;
                        drawBtn.disabled = false;
                        drawBtn.innerText = "다시 추첨";
                        saveHistory(targetNumbers);
                        return;
                    }
                    extractBall(targetNumbers[drawCount], drawCount === 6);
                    drawCount++;
                }, 1800); 
            }, 4000); 
        }

        // ==========================================
        // ✨ 날짜별 필수 번호 포함 로직으로 개선된 부분
        // ==========================================
        function generateWinningNumbers() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const currentDateStr = `${yyyy}-${mm}-${dd}`;

            // 추후 년도별/기간별 설정 배열 (2027년도 아래에 동일한 포맷으로 추가 가능)
            const requiredNumbersConfig = [
                // 2026년 설정
                { startDate: '2026-03-01', endDate: '2026-04-25', numbers: [4, 9] },
                { startDate: '2026-04-26', endDate: '2026-06-27', numbers: [1, 6, 16] },
                { startDate: '2026-06-28', endDate: '2026-08-29', numbers: [6, 9] },
                { startDate: '2026-08-30', endDate: '2026-10-31', numbers: [1, 4, 14, 41] }, // 오름차순 삽입 무관
                { startDate: '2026-11-01', endDate: '2026-12-26', numbers: [1, 4, 9] }
                
                // 예시: 2027년 추가 시
                // , { startDate: '2027-01-01', endDate: '2027-02-28', numbers: [7, 17] }
            ];

            let result = [];
            
            // 현재 날짜가 포함된 기간 찾기
            const matchedConfig = requiredNumbersConfig.find(config => 
                currentDateStr >= config.startDate && currentDateStr <= config.endDate
            );

            // 해당 기간의 필수 번호가 있다면 결과 배열에 미리 담기
            if (matchedConfig) {
                result = [...matchedConfig.numbers]; 
            }

            // 총 7개(보너스 포함)가 될 때까지 중복 없는 랜덤 번호 추가
            while (result.length < 7) {
                let randomNum = Math.floor(Math.random() * 45) + 1;
                if (!result.includes(randomNum)) {
                    result.push(randomNum);
                }
            }

            // 필수 번호가 항상 앞쪽에만(먼저) 나오는 것을 방지하기 위해 배열 순서 무작위 섞기 (Fisher-Yates Shuffle)
            for (let i = result.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [result[i], result[j]] = [result[j], result[i]];
            }

            return result;
        }
        // ==========================================

        function extractBall(number, isBonus) {
            if (navigator.vibrate) navigator.vibrate(15);
            
            const targetBall = balls.find(b => b.number === number);
            if (!targetBall || !targetBall.active) return;

            targetBall.active = false;
            World.remove(engine.world, targetBall.body);
            targetBall.el.style.opacity = '0'; 

            const resultsContainer = document.getElementById('results');
            if (isBonus) {
                const plusSign = document.createElement('div');
                plusSign.className = 'bonus-plus';
                plusSign.innerText = '+'; 
                resultsContainer.appendChild(plusSign);
            }

            const resultBall = document.createElement('div');
            resultBall.className = `result-ball ${getBallColorClass(number)}`;
            resultBall.innerText = number;
            if(number <= 20 || number >= 41) resultBall.style.color = '#333';
            else resultBall.style.color = '#fff';
            resultsContainer.appendChild(resultBall);
        }

        function saveHistory(numbers) {
            drawHistory.push(numbers); 
            updateHistoryUI(); 
        }

        function updateHistoryUI() {
            const section = document.getElementById('history-section');
            const list = document.getElementById('history-list');
            if (drawHistory.length > 0) section.style.display = 'block'; 
            list.innerHTML = '';
            
            drawHistory.forEach((nums, index) => {
                const row = document.createElement('div');
                row.className = 'history-row';
                
                const turnStr = document.createElement('div');
                turnStr.className = 'history-turn';
                const setNum = (index + 1).toString().padStart(2, '0');
                turnStr.innerText = `SET ${setNum}`;
                row.appendChild(turnStr);

                const ballsContainer = document.createElement('div');
                ballsContainer.className = 'mini-balls';

                nums.forEach((num, i) => {
                    if (i === 6) {
                        const plus = document.createElement('div');
                        plus.className = 'mini-bonus-plus';
                        plus.innerText = '+';
                        ballsContainer.appendChild(plus);
                    }
                    const b = document.createElement('div');
                    b.className = `mini-ball ${getBallColorClass(num)}`;
                    b.innerText = num;
                    if(num <= 20 || num >= 41) b.style.color = '#333';
                    else b.style.color = '#fff';
                    ballsContainer.appendChild(b);
                });
                row.appendChild(ballsContainer);
                list.prepend(row); 
            });
        }

        function clearHistory() {
            if (confirm("추첨 기록을 모두 지우시겠습니까?")) {
                drawHistory = [];
                document.getElementById('history-section').style.display = 'none';
                document.getElementById('history-list').innerHTML = '';
            }
        }

        function generateReceiptImage() {
            if (drawHistory.length === 0) return;

            const now = new Date();
            const baseDate = new Date('2026-02-28T20:45:00').getTime(); 
            const diffWeeks = Math.floor((now.getTime() - baseDate) / (7 * 24 * 60 * 60 * 1000));
            const currentRound = 1213 + diffWeeks + 1; 

            const days = ['일', '월', '화', '수', '목', '금', '토'];
            const pad = (n) => n.toString().padStart(2, '0');
            const issueStr = `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())} (${days[now.getDay()]}) ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
            
            let drawDate = new Date(now);
            let dayOfWeek = drawDate.getDay();
            let daysToSat = (6 - dayOfWeek + 7) % 7;
            if (dayOfWeek === 6 && (now.getHours() > 20 || (now.getHours() === 20 && now.getMinutes() >= 45))) {
                daysToSat = 7; 
            }
            drawDate.setDate(drawDate.getDate() + daysToSat);
            const drawStr = `${drawDate.getFullYear()}/${pad(drawDate.getMonth()+1)}/${pad(drawDate.getDate())}`;

            let expireDate = new Date(drawDate);
            expireDate.setFullYear(expireDate.getFullYear() + 1);
            expireDate.setDate(expireDate.getDate() + 1);
            const expireStr = `${expireDate.getFullYear()}/${pad(expireDate.getMonth()+1)}/${pad(expireDate.getDate())}`;

            const randomSerial = () => Math.floor(10000 + Math.random() * 90000);
            const serialStr = `${randomSerial()} ${randomSerial()} ${randomSerial()} ${randomSerial()} ${randomSerial()} *****`;

            document.getElementById('rt-round-num').innerText = currentRound;
            document.getElementById('rt-issue-date').innerText = issueStr;
            document.getElementById('rt-draw-date').innerText = drawStr;
            document.getElementById('rt-expire-date').innerText = expireStr;
            document.getElementById('rt-serial').innerText = serialStr;

            const rtRows = document.getElementById('rt-rows');
            rtRows.innerHTML = '';
            
            const targets = drawHistory.slice(-5);
            const labels = ['A', 'B', 'C', 'D', 'E'];
            
            targets.forEach((nums, index) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'rt-row';
                const mainNumbers = nums.slice(0, 6).sort((a, b) => a - b);
                const numHtml = mainNumbers.map(n => `<span>${pad(n)}</span>`).join('');
                rowDiv.innerHTML = `<div class="rt-row-label">SET ${labels[index]}</div><div class="rt-row-nums">${numHtml}</div>`;
                rtRows.appendChild(rowDiv);
            });

            const totalPrice = (targets.length * 1000).toLocaleString();
            document.getElementById('rt-price').innerText = totalPrice;

            const template = document.getElementById('receipt-template');
            
            html2canvas(template, {
                scale: 3, 
                backgroundColor: '#12121c'
            }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const resultImgElement = document.getElementById('result-image');
                resultImgElement.src = imgData;
                
                const downloadBtn = document.getElementById('download-img-btn');
                downloadBtn.onclick = function() {
                    const link = document.createElement('a');
                    link.download = `Lotto_Receipt_${new Date().getTime()}.png`;
                    link.href = imgData;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                };
                
                document.getElementById('image-modal').style.display = 'flex';
            });
        }

        function closeModal() {
            document.getElementById('image-modal').style.display = 'none';
        }
    </script>
